<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cartographer of the Sleeping City</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <!--
      The world layer scrolls beneath the figure as they walk.
      Per FOUNDING.md §3: the viewport is a single screen; the world is
      larger than the viewport and scrolls beneath the figure as they walk.
      Add map content INSIDE this layer so it scrolls with the world.
    -->
    <div id="world" data-role="world">
      <!-- AGENTS' OBJECTS GO HERE -->
    </div>

    <!--
      The figure stays at fixed center. Do not translate the figure on
      keypress — translate the world instead.
    -->
    <div id="figure" data-role="figure" aria-hidden="true">
      <svg viewBox="0 0 14 18" width="14" height="18">
        <!-- coat: oval body, slightly transparent -->
        <ellipse cx="7" cy="11" rx="6" ry="7" fill="currentColor" opacity="0.5" />
        <!-- head: small solid dot, partially nested into the coat -->
        <circle cx="7" cy="5" r="2.5" fill="currentColor" />
      </svg>
    </div>

    <!-- AGENTS' OVERLAYS GO HERE -->
  </div>
  <script src="game.js"></script>
</body>
</html>
